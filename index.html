<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ИСОД МВД</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        input, button { padding: 10px; margin: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background: #003366; color: white; }
        .stats { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat { background: #003366; color: white; padding: 15px; border-radius: 10px; }
        .stat-value { font-size: 32px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🏛️ ИСОД МВД России</h1>
    <p>УМВД России по г. Провинция</p>

    <div class="stats" id="stats"></div>

    <div>
        <h3>➕ Добавить гражданина</h3>
        <input type="text" id="nickname" placeholder="Никнейм">
        <input type="text" id="fullname" placeholder="ФИО">
        <button onclick="addCitizen()">Добавить</button>
    </div>

    <div>
        <h3>📋 Список граждан</h3>
        <table>
            <thead><tr><th>ID</th><th>Никнейм</th><th>ФИО</th><th>Паспорт</th><th>Статус</th><th>Действия</th></tr></thead>
            <tbody id="citizensList"></tbody>
        </table>
    </div>

    <script>
        async function api(url, options = {}) {
            const res = await fetch(url, options);
            if (!res.ok) throw new Error(await res.text());
            return res.json();
        }

        async function loadStats() {
            const stats = await api('/api/stats');
            document.getElementById('stats').innerHTML = `
                <div class="stat"><div class="stat-value">${stats.citizens}</div><div>Граждан</div></div>
                <div class="stat"><div class="stat-value">${stats.wanted}</div><div>В розыске</div></div>
            `;
        }

        async function loadCitizens() {
            const citizens = await api('/api/citizens');
            document.getElementById('citizensList').innerHTML = citizens.map(c => `
                <tr>
                    <td>${c.id}</td>
                    <td>${c.nickname}</td>
                    <td>${c.full_name}</td>
                    <td>${c.passport_number || '—'}</td>
                    <td>${c.is_wanted ? '⚠️ В розыске' : '—'}</td>
                    <td>
                        ${!c.is_wanted ? 
                            `<button onclick="wantedPerson(${c.id})">🔴 В розыск</button>` : 
                            `<button onclick="unwantedPerson(${c.id})">✅ Снять</button>`
                        }
                    </td>
                </table>
            `).join('');
            loadStats();
        }

        async function addCitizen() {
            const nickname = document.getElementById('nickname').value;
            const fullname = document.getElementById('fullname').value;
            
            if (!nickname || !fullname) {
                alert('Заполните никнейм и ФИО');
                return;
            }
            
            try {
                const result = await api('/api/citizens', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nickname, full_name: fullname })
                });
                alert('✅ Гражданин добавлен! Паспорт: ' + result.passport_number);
                document.getElementById('nickname').value = '';
                document.getElementById('fullname').value = '';
                loadCitizens();
            } catch(err) {
                alert('Ошибка: ' + err.message);
            }
        }

        async function wantedPerson(id) {
            await api(`/api/citizens/${id}/wanted`, { method: 'POST' });
            alert('⚠️ Объявлен в розыск');
            loadCitizens();
        }

        async function unwantedPerson(id) {
            await api(`/api/citizens/${id}/unwanted`, { method: 'POST' });
            alert('✅ Снят с розыска');
            loadCitizens();
        }

        loadCitizens();
    </script>
</body>
</html>
